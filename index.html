<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milap & Mahima's Sangeet - Seatfinder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:wght@500;700&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0c1a3b;       /* Rich Indigo Blue */
            --card-bg: #142857;        /* Slightly lighter blue for the card */
            --rani-pink: #d11266;      /* Traditional Indian Hot Pink */
            --gold-accent: #f0c05a;    /* Palace Gold */
            --text-light: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            background-image: radial-gradient(var(--gold-accent) 0.5px, transparent 0.5px);
            background-size: 30px 30px;
        }

        .container {
            background: var(--card-bg);
            padding: 40px 25px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 0 0 10px rgba(240, 192, 90, 0.2);
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 2px solid var(--gold-accent);
            position: relative;
            overflow: hidden;
        }

        /* Palace archways are added as a background watermark inside the card */
        .container::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(180deg, var(--gold-accent) 1px, transparent 1px),
                linear-gradient(90deg, var(--gold-accent) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0.05;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3.5rem;
            margin: 0 0 5px 0;
            color: var(--text-light);
            font-weight: normal;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }

        .date {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            color: var(--gold-accent);
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            font-style: italic;
            font-size: 1rem;
            color: #eeeeee;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            background-color: rgba(255, 255, 255, 0.1);
            border: 2px solid var(--gold-accent);
            border-radius: 30px;
            box-sizing: border-box;
            outline: none;
            color: white;
            font-family: inherit;
            transition: all 0.3s;
            margin-bottom: 20px;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: var(--rani-pink);
            background-color: rgba(255, 255, 255, 0.15);
            box-shadow: 0 0 10px rgba(209, 18, 102, 0.4);
        }

        button {
            background-color: var(--rani-pink);
            background-image: linear-gradient(135deg, var(--rani-pink), #a00b4d);
            color: white;
            border: 2px solid var(--gold-accent);
            padding: 14px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        }

        button:disabled {
            background: #4a5470;
            box-shadow: none;
            cursor: not-allowed;
            color: #aaaaaa;
            border-color: #666666;
        }

        .result {
            margin-top: 30px;
            padding: 25px 20px;
            border-radius: 15px;
            display: none;
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        .success {
            background-color: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--gold-accent);
        }

        .error {
            background-color: rgba(254, 242, 242, 0.05);
            border: 2px solid #f8b4b4;
            color: #f8b4b4;
        }

        .table-number {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            font-weight: bold;
            color: var(--rani-pink);
            margin: 15px 0;
            text-shadow: 0 0 15px rgba(209, 18, 102, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <hr style="border: 0; border-top: 2px solid var(--gold-accent); width: 60px; margin: 0 auto 10px auto;">
    
    <h1>Milap & Mahima's</h1>
    <div style="font-family: 'Playfair Display', serif; color: var(--text-light); text-transform: uppercase; font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 5px;">Sangeet</div>
    <div class="date">August 8th</div>
    
    <div style="margin-bottom: 30px; display: flex; justify-content: center; gap: 8px; color: var(--gold-accent);">
        <span style="font-size: 1.4rem;">♦</span><span style="font-size: 1.4rem;">♦</span><span style="font-size: 1.4rem;">♦</span>
    </div>

    <div class="subtitle" id="statusMessage">Preparing the royal guest list...</div>
    
    <input type="text" id="guestName" placeholder="Enter your name" autocomplete="off" disabled>
    <button id="searchBtn" onclick="findSeat()" disabled>Find My Seat</button>

    <div id="resultBox" class="result"></div>
</div>

<script>
    // ⚠️ PASTE YOUR COPIED GOOGLE SHEETS CSV LINK BETWEEN THE QUOTES BELOW
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkCTgB5LCfk3aJHdxykhizZSCu3K4fV1jC1HVWZEm6Q9n54r293loPq8Rp4xnAlcRxQ85nbkGcHOSD/pub?gid=0&single=true&output=csv";

    let guestList = {};

    async function fetchGuestList() {
        const statusMessage = document.getElementById("statusMessage");
        const nameInput = document.getElementById("guestName");
        const searchBtn = document.getElementById("searchBtn");

        try {
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error("Failed to fetch data");
            
            const data = await response.text();
            const lines = data.split("\n");
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const columns = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (columns.length >= 2) {
                    const name = columns[0].replace(/"/g, "").trim().toLowerCase();
                    const table = columns[1].replace(/"/g, "").trim();
                    if (name) {
                        guestList[name] = table;
                    }
                }
            }

            statusMessage.innerText = "Please enter your name to find your table:";
            nameInput.disabled = false;
            searchBtn.disabled = false;

        } catch (error) {
            console.error(error);
            statusMessage.innerText = "Error loading guest list. Please see the coordinator.";
            statusMessage.style.color = "#f8b4b4";
        }
    }

    function findSeat() {
        const input = document.getElementById("guestName").value.trim().toLowerCase();
        const resultBox = document.getElementById("resultBox");

        if (input === "") {
            resultBox.className = "result error";
            resultBox.innerHTML = "Please enter your name.";
            resultBox.style.display = "block";
            return;
        }

        let foundTable = null;
        let matchedName = "";

        for (let guest in guestList) {
            if (guest.includes(input) || input.includes(guest)) {
                foundTable = guestList[guest];
                matchedName = guest.replace(/\b\w/g, char => char.toUpperCase());
                break;
            }
        }

        if (foundTable) {
            resultBox.className = "result success";
            resultBox.innerHTML = `
                <div style="color: #eee;">Hi <strong>${matchedName}</strong>, you are at</div>
                <div class="table-number">${foundTable}</div>
                <div style="color: var(--gold-accent); font-size: 1.1rem; font-family: 'Great Vibes', cursive;">Let's dance the night away!</div>
            `;
        } else {
            resultBox.className = "result error";
            resultBox.innerHTML = "Name not found. Please check spelling or see our coordinator.";
        }

        resultBox.style.display = "block";
    }

    document.getElementById("guestName").addEventListener("keypress", function(event) {
        if (event.key === "Enter" && !this.disabled) {
            findSeat();
        }
    });

    window.onload = fetchGuestList;
</script>

</body>
</html>
