<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milap & Mahima's Sangeet - Seatfinder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Great+Vibes&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b132b;       /* Deep Midnight Blue */
            --card-bg: #111a36;        /* Slightly lighter blue for the card */
            --pink-accent: #ff2a85;    /* Vibrant Sangeet Pink */
            --gold-accent: #e5c158;    /* Champagne Gold */
            --text-light: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            /* Adds subtle glowing dots in the background to match your decor theme */
            background-image: 
                radial-gradient(rgba(255, 42, 133, 0.15) 1px, transparent 0),
                radial-gradient(rgba(229, 193, 88, 0.1) 1px, transparent 0);
            background-size: 24px 24px;
            background-position: 0 0, 12px 12px;
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background: var(--card-bg);
            padding: 40px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(255, 42, 133, 0.2);
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 2px solid rgba(229, 193, 88, 0.3); /* Subtle gold border */
            position: relative;
            overflow: hidden;
        }

        /* Festive decorative corner accents */
        .container::before {
            content: "✨";
            position: absolute;
            top: 15px;
            left: 20px;
            color: var(--gold-accent);
            font-size: 1.2rem;
        }
        .container::after {
            content: "✨";
            position: absolute;
            top: 15px;
            right: 20px;
            color: var(--gold-accent);
            font-size: 1.2rem;
        }

        .welcome-to {
            font-family: 'Cinzel', serif;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--gold-accent);
            margin-bottom: 5px;
        }

        h1 {
            font-family: 'Great Vibes', cursive;
            font-size: 3rem;
            margin: 0 0 5px 0;
            color: var(--text-light);
            font-weight: normal;
            text-shadow: 0 2px 10px rgba(255, 42, 133, 0.3);
        }

        .event-title {
            font-family: 'Cinzel', serif;
            font-size: 1.4rem;
            color: var(--pink-accent);
            letter-spacing: 1px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .date {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .subtitle {
            font-style: italic;
            font-size: 0.95rem;
            color: #dddddd;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 20px;
            font-size: 1rem;
            background-color: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            box-sizing: border-box;
            outline: none;
            color: white;
            font-family: inherit;
            transition: all 0.3s;
            margin-bottom: 20px;
            text-align: center;
        }

        input[type="text"]:focus {
            border-color: var(--pink-accent);
            background-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 10px rgba(255, 42, 133, 0.3);
        }

        button {
            background: linear-gradient(135deg, var(--pink-accent), #d11362);
            color: white;
            border: none;
            padding: 14px 30px;
            font-size: 1.05rem;
            font-weight: 600;
            letter-spacing: 1px;
            border-radius: 30px;
            cursor: pointer;
            font-family: inherit;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(255, 42, 133, 0.4);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255, 42, 133, 0.6);
        }

        button:disabled {
            background: #444b5e;
            box-shadow: none;
            cursor: not-allowed;
            color: #888;
        }

        .result {
            margin-top: 30px;
            padding: 25px 20px;
            border-radius: 15px;
            display: none;
            animation: fadeIn 0.4s ease-in-out forwards;
        }

        .success {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(229, 193, 88, 0.4);
        }

        .error {
            background-color: rgba(254, 242, 242, 0.05);
            border: 1px solid #f8b4b4;
            color: #f8b4b4;
        }

        .table-number {
            font-family: 'Cinzel', serif;
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--pink-accent);
            margin: 15px 0;
            text-shadow: 0 0 15px rgba(255, 42, 133, 0.5);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="welcome-to">Welcome to</div>
    <h1>Milap & Mahima's</h1>
    <div class="event-title">Sangeet Party</div>
    <div class="date">August 8th</div>
    
    <hr style="border: 0; border-top: 1px dashed rgba(229,193,88,0.2); margin-bottom: 25px;">

    <div class="subtitle" id="statusMessage">Tuning up the guest list...</div>
    
    <input type="text" id="guestName" placeholder="Enter your name" autocomplete="off" disabled>
    <button id="searchBtn" onclick="findSeat()" disabled>Find My Seat</button>

    <div id="resultBox" class="result"></div>
</div>

<script>
    // ⚠️ PASTE YOUR COPIED GOOGLE SHEETS CSV LINK BETWEEN THE QUOTES BELOW
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQkCTgB5LCfk3aJHdxykhizZSCu3K4fV1jC1HVWZEm6Q9n54r293loPq8Rp4xnAlcRxQ85nbkGcHOSD/pub?gid=0&single=true&output=csv";

    let guestList = {};

    async function fetchGuestList() {
        const statusMessage = document.getElementById("statusMessage");
        const nameInput = document.getElementById("guestName");
        const searchBtn = document.getElementById("searchBtn");

        try {
            const response = await fetch(csvUrl);
            if (!response.ok) throw new Error("Failed to fetch data");
            
            const data = await response.text();
            const lines = data.split("\n");
            
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const columns = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                if (columns.length >= 2) {
                    const name = columns[0].replace(/"/g, "").trim().toLowerCase();
                    const table = columns[1].replace(/"/g, "").trim();
                    if (name) {
                        guestList[name] = table;
                    }
                }
            }

            statusMessage.innerText = "Please enter your name to find your table:";
            nameInput.disabled = false;
            searchBtn.disabled = false;

        } catch (error) {
            console.error(error);
            statusMessage.innerText = "Error loading guest list. Please see the coordinator.";
            statusMessage.style.color = "#f8b4b4";
        }
    }

    function findSeat() {
        const input = document.getElementById("guestName").value.trim().toLowerCase();
        const resultBox = document.getElementById("resultBox");

        if (input === "") {
            resultBox.className = "result error";
            resultBox.innerHTML = "Please enter your name.";
            resultBox.style.display = "block";
            return;
        }

        let foundTable = null;
        let matchedName = "";

        for (let guest in guestList) {
            if (guest.includes(input) || input.includes(guest)) {
                foundTable = guestList[guest];
                matchedName = guest.replace(/\b\w/g, char => char.toUpperCase());
                break;
            }
        }

        if (foundTable) {
            resultBox.className = "result success";
            resultBox.innerHTML = `
                <div style="color: #eee;">Hi <strong>${matchedName}</strong>, you are at</div>
                <div class="table-number">${foundTable}</div>
                <div style="color: var(--gold-accent); font-size: 1.1rem; font-family: 'Great Vibes', cursive;">Let's dance!</div>
            `;
        } else {
            resultBox.className = "result error";
            resultBox.innerHTML = "Name not found. Please check spelling or see our coordinator near the entrance.";
        }

        resultBox.style.display = "block";
    }

    document.getElementById("guestName").addEventListener("keypress", function(event) {
        if (event.key === "Enter" && !this.disabled) {
            findSeat();
        }
    });

    window.onload = fetchGuestList;
</script>

</body>
</html>
